<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=600">
    <title>感谢使用 - ERP订单自动比对</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "Microsoft YaHei", sans-serif;
            font-size: 14px;
            color: #333;
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .card {
            background: #fff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.08);
            text-align: center;
            max-width: 500px;
            width: 100%;
        }
        .icon {
            font-size: 48px;
            margin-bottom: 16px;
        }
        h1 {
            font-size: 22px;
            margin-bottom: 12px;
            color: #333;
        }
        p {
            color: #666;
            margin-bottom: 20px;
            line-height: 1.6;
        }
        .feedback {
            margin: 24px 0;
        }
        textarea {
            width: 100%;
            height: 100px;
            padding: 12px;
            border: 1px solid #d9d9d9;
            border-radius: 6px;
            font-family: inherit;
            font-size: 13px;
            resize: vertical;
        }
        .btn {
            display: inline-block;
            padding: 10px 24px;
            background: #00a69b;
            color: #fff;
            text-decoration: none;
            border-radius: 6px;
            font-weight: 500;
            border: none;
            cursor: pointer;
            font-size: 14px;
        }
        .btn:hover {
            background: #008f82;
        }
        .footer {
            margin-top: 24px;
            font-size: 12px;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">😊</div>
        <h1>感谢您使用 ERP订单自动比对</h1>
        <p>很抱歉看到您离开。如果您愿意，可以告诉我们卸载的原因，帮助我们做得更好。</p>

        <div class="feedback">
            <textarea id="feedback-text" placeholder="请输入您的建议或遇到的问题..."></textarea>
        </div>

        <button class="btn" onclick="submitFeedback()">提交反馈</button>

        <div class="footer">
            <p>如需重新使用，可在 Chrome 应用商店重新安装。</p>
            <p>技术支持：liuhong1688@vip.qq.com</p>
        </div>
    </div>

    <script>
        function submitFeedback() {
            const text = document.getElementById('feedback-text').value.trim();
            if (!text) {
                alert('请输入反馈内容');
                return;
            }
            // In real product, send to your feedback endpoint
            // fetch('https://your-feedback-api.com/uninstall', { method: 'POST', body: JSON.stringify({ feedback: text }) });
            alert('感谢您的反馈！');
            document.getElementById('feedback-text').value = '';
        }
    </script>
</body>
</html>
